name: Backfill snapshot

# Keeps the historical snapshot up to date and publishes it to GitHub Pages.
#  - Daily (cron): fetch yesterday's data, append to data/*.csv, rebuild public/v1/.
#  - Manual (workflow_dispatch): run a one-time `bootstrap` to seed the history.
on:
  schedule:
    - cron: '0 4 * * *'        # 04:00 UTC daily (after Elexon overnight settlement)
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily (append yesterday) or bootstrap (seed history)'
        type: choice
        default: daily
        options: [daily, bootstrap]
      step_days:
        description: 'bootstrap: year sample spacing in days (1 = full daily)'
        default: '1'
      alltime:
        description: 'bootstrap: also seed all-time monthly (0/1)'
        default: '1'

# Only one run at a time (it commits back to the repo).
concurrency:
  group: backfill
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    container: swift:6.0           # official Swift image (Ubuntu-based, includes git)
    permissions:
      contents: write             # to commit data/*.csv back
    steps:
      - uses: actions/checkout@v4

      - name: Generate snapshot
        env:
          MODE: ${{ github.event.inputs.mode || 'daily' }}
          STEP_DAYS: ${{ github.event.inputs.step_days || '1' }}
          ALLTIME: ${{ github.event.inputs.alltime || '1' }}
          DATA_DIR: data
          OUT_DIR: public/v1
        run: swift "national grid live tools/main.swift"

      - name: Commit updated data
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data public
          git diff --cached --quiet || git commit -m "data: snapshot update $(date -u +%F)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
